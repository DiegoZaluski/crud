<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">

    <aside class="sidebar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Users API</span>
      </div>

      <nav class="nav">
        <button type="button" class="nav-item active" data-method="GET" data-tab="get-all">
          <span class="badge badge-get">GET</span>
          <span>List Users</span>
        </button>
        <button type="button" class="nav-item" data-method="GET" data-tab="get-one">
          <span class="badge badge-get">GET</span>
          <span>Find User</span>
        </button>
        <button type="button" class="nav-item" data-method="POST" data-tab="post">
          <span class="badge badge-post">POST</span>
          <span>Create User</span>
        </button>
        <button type="button" class="nav-item" data-method="PATCH" data-tab="patch">
          <span class="badge badge-patch">PATCH</span>
          <span>Update User</span>
        </button>
        <button type="button" class="nav-item" data-method="DELETE" data-tab="delete">
          <span class="badge badge-delete">DEL</span>
          <span>Delete User</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">localhost:8000</span>
      </div>
    </aside>

    <main class="main">

      <!-- GET ALL -->
      <section class="tab active" id="tab-get-all">
        <div class="tab-header">
          <span class="badge badge-get">GET</span>
          <code class="endpoint">/api/operations</code>
          <p class="tab-desc">Returns all users in the database.</p>
        </div>
        <button type="button" class="btn-run" id="btn-get-all">Run</button>
        <div class="response-box" id="res-get-all"></div>
      </section>

      <!-- GET ONE -->
      <section class="tab" id="tab-get-one">
        <div class="tab-header">
          <span class="badge badge-get">GET</span>
          <code class="endpoint">/api/operations?id= or ?name=</code>
          <p class="tab-desc">Find a user by ID or name.</p>
        </div>
        <div class="field-group">
          <div class="field">
            <label>id</label>
            <input type="number" id="get-id" placeholder="1" />
          </div>
          <div class="field-or">or</div>
          <div class="field">
            <label>name</label>
            <input type="text" id="get-name" placeholder="diego" />
          </div>
        </div>
        <button type="button" class="btn-run" id="btn-get-one">Run</button>
        <div class="response-box" id="res-get-one"></div>
      </section>

      <!-- POST -->
      <section class="tab" id="tab-post">
        <div class="tab-header">
          <span class="badge badge-post">POST</span>
          <code class="endpoint">/api/operations</code>
          <p class="tab-desc">Create a new user.</p>
        </div>
        <div class="field-group vertical">
          <div class="field">
            <label>name</label>
            <input type="text" id="post-name" placeholder="diego" />
          </div>
          <div class="field">
            <label>age</label>
            <input type="number" id="post-age" placeholder="21" />
          </div>
          <div class="field">
            <label>description</label>
            <input type="text" id="post-desc" placeholder="Software engineer" />
          </div>
        </div>
        <button type="button" class="btn-run" id="btn-post">Run</button>
        <div class="response-box" id="res-post"></div>
      </section>

      <!-- PATCH -->
      <section class="tab" id="tab-patch">
        <div class="tab-header">
          <span class="badge badge-patch">PATCH</span>
          <code class="endpoint">/api/operations?id=</code>
          <p class="tab-desc">Partially update a user by ID.</p>
        </div>
        <div class="field-group vertical">
          <div class="field">
            <label>id <span class="required">*</span></label>
            <input type="number" id="patch-id" placeholder="1" />
          </div>
          <div class="field">
            <label>name</label>
            <input type="text" id="patch-name" placeholder="new name" />
          </div>
          <div class="field">
            <label>age</label>
            <input type="number" id="patch-age" placeholder="new age" />
          </div>
          <div class="field">
            <label>description</label>
            <input type="text" id="patch-desc" placeholder="new description" />
          </div>
        </div>
        <button type="button" class="btn-run" id="btn-patch">Run</button>
        <div class="response-box" id="res-patch"></div>
      </section>

      <!-- DELETE -->
      <section class="tab" id="tab-delete">
        <div class="tab-header">
          <span class="badge badge-delete">DELETE</span>
          <code class="endpoint">/api/operations?id=</code>
          <p class="tab-desc">Delete a user by ID.</p>
        </div>
        <div class="field-group">
          <div class="field">
            <label>id <span class="required">*</span></label>
            <input type="number" id="delete-id" placeholder="1" />
          </div>
        </div>
        <button type="button" class="btn-run btn-danger" id="btn-delete">Run</button>
        <div class="response-box" id="res-delete"></div>
      </section>

    </main>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
